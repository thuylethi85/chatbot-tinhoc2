<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Chatbot Tin học</title>

  <!-- Dialogflow Messenger -->
  <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>

  <!-- Tùy chỉnh giao diện -->
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    df-messenger {
      --df-messenger-bot-message: #e3f2fd;
      --df-messenger-button-titlebar-color: #1976d2;
      --df-messenger-chat-background-color: #ffffff;
      --df-messenger-font-color: black;
      --df-messenger-user-message: #dcf8c6;

      position: fixed;
      bottom: 16px;
      right: 16px;
    }
  </style>
</head>

<body>

  <h2 style="text-align:center; margin-top: 40px;">
    🤖 Chatbot hỗ trợ môn Tin học
  </h2>

  <p style="text-align:center;">
    Hãy nhấn vào biểu tượng chat góc dưới để bắt đầu.
  </p>

  <!-- Chatbot -->
  <df-messenger
    intent="WELCOME"
    chat-title="Trợ lý Tin học"
    agent-id="chatbotsv-qdit"
    language-code="vi">
  </df-messenger>

</body>
</html>
